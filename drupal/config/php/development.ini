; ==============================================================================
; PHP Development Overrides
; ==============================================================================
; Mounted in dev mode at /usr/local/etc/php/conf.d/98-development.ini
; Overrides the hardened production settings.
; ==============================================================================

; Errors visible everywhere (browser + log)
error_reporting = E_ALL
display_errors = On
display_startup_errors = On
log_errors = On
error_log = /proc/self/fd/2

; OPcache: validate frequently so file edits are picked up immediately
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
opcache.enable = 1
opcache.memory_consumption = 256

; Upload limits (same as prod so exports/import stay consistent)
upload_max_filesize = 128M
post_max_size = 128M
max_execution_time = 600
max_input_vars = 5000
max_input_time = 600
memory_limit = 512M

; XDebug — ready to use if the extension is installed later
; xdebug.mode = develop,debug
; xdebug.start_with_request = yes
; xdebug.client_host = host.docker.internal
; xdebug.client_port = 9003
; xdebug.idekey = PHPSTORM

; Realpath cache shorter TTL for dev churn
realpath_cache_size = 4096K
realpath_cache_ttl = 120

; Date
date.timezone = UTC

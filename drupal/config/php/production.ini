; Production PHP overrides for Drupal
; Optimized for containerized deployments with PHP 8.3+

; Memory
memory_limit = 512M
upload_max_filesize = 128M
post_max_size = 128M
max_execution_time = 600
max_input_vars = 5000
max_input_time = 600

; Error handling - log only, never expose to users
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /proc/self/fd/2

; Session
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1
session.gc_probability = 1
session.gc_divisor = 1000
session.gc_maxlifetime = 14400

; OPcache - aggressive caching for production
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1
opcache.save_comments = 1
opcache.validate_timestamps = 0
opcache.consistency_checks = 0

; Realpath cache
realpath_cache_size = 4096K
realpath_cache_ttl = 1200

; File uploads
file_uploads = On
upload_tmp_dir = /tmp

; Disable dangerous functions
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_multi_exec,show_source

; Date
date.timezone = UTC

; Security
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

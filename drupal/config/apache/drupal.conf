<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/web

    <Directory /var/www/html/web>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        # Protect sensitive files — mirrors Drupal core .htaccess,
        # but only blocks obvious source/backup files at the VirtualHost level.
        # Drupal's own .htaccess (AllowOverride All) handles the rest.
        <FilesMatch "\.(engine|inc|install|make|module|profile|po|sh|.*sql|twig|tpl(\.php)?|xtmpl|yml)(~|\.sw[op]|\.bak|\.orig|\.save)?$|^(\.(?!well-known).*|Entries.*|Repository|Root|Tag|Template|composer\.(json|lock)|web\.config|yarn\.lock|package\.json)$|^#.*#$|\.php(~|\.sw[op]|\.bak|\.orig|\.save)$">
            Require all denied
        </FilesMatch>

        # Set cache headers for static assets
        <IfModule mod_expires.c>
            ExpiresActive on
            ExpiresDefault "access plus 1 month"
            <FilesMatch "\.(css|js|png|gif|jpe?g|svg|ico|woff2?|ttf|eot|pdf|mp3|mp4|ogg|webm)$">
                ExpiresDefault "access plus 1 year"
            </FilesMatch>
        </IfModule>

        # Compress text assets
        <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
        </IfModule>
    </Directory>

    # Logging
    LogLevel warn
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined

    # Security headers
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options SAMEORIGIN
    Header always set Referrer-Policy strict-origin-when-cross-origin
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
</VirtualHost>

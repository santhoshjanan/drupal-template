# ==============================================================================
# Redis Stack Server — Production Baseline Configuration
# ==============================================================================

# Network
bind 0.0.0.0
port 6379
protected-mode yes

# Authentication (override via env REDIS_PASSWORD at runtime)
# requirepass will be appended by docker-compose if REDIS_PASSWORD is set

# Persistence — AOF for durability, RDB for point-in-time recovery
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Connections
timeout 300
tcp-keepalive 300
maxclients 10000

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Logging
loglevel warning

# Security
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command DEBUG    ""
